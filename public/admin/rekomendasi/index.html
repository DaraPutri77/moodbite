<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodBite - Dashboard Admin</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#fff7ed;color:#2b140c}
    .nav{background:#7c250c;color:white;padding:22px 8%;display:flex;justify-content:space-between;align-items:center}
    .brand{font-size:28px;font-weight:800}
    .nav a{color:white;text-decoration:none;font-weight:700;margin-left:18px}
    .container{padding:36px 8%}
    .panel,.card{background:white;border-radius:24px;padding:28px;margin-bottom:24px;box-shadow:0 20px 50px #00000012}
    input,textarea{width:100%;padding:14px;border:1px solid #fed7aa;border-radius:12px;margin:8px 0 16px;font-size:16px}
    label{font-weight:800}
    .btn{background:#f97316;color:white;padding:12px 18px;border-radius:12px;border:0;font-weight:800;cursor:pointer;text-decoration:none}
    .danger{background:#dc2626}
    .edit{background:#facc15;color:#2b140c}
    .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
    .badge{background:#ffedd5;color:#8a2f12;padding:8px 14px;border-radius:999px;display:inline-block;font-weight:800}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="brand">&#127869;&#65039; MoodBite Admin</div>
    <div>
      <a href="/">Dashboard Pengguna</a>
      <a href="/admin/rekomendasi">Dashboard Admin</a>
    </div>
  </nav>

  <main class="container">
    <section class="panel">
      <h1>Dashboard Admin Rekomendasi</h1>
      <p>Admin dapat menambah, melihat, mengubah, dan menghapus data rekomendasi makanan.</p>

      <input type="hidden" id="row_id">

      <label>Mood</label>
      <input id="mood" placeholder="Contoh: Bahagia, Sedih, Capek">

      <label>Nama Makanan</label>
      <input id="food_name" placeholder="Contoh: Sup Ayam Hangat">

      <label>Kategori</label>
      <input id="category" placeholder="Contoh: Comfort Food">

      <label>Rasa / Sensasi</label>
      <input id="taste" placeholder="Contoh: Gurih dan hangat">

      <label>Alasan Rekomendasi</label>
      <textarea id="reason" rows="4" placeholder="Jelaskan alasan rekomendasi"></textarea>

      <label><input type="checkbox" id="is_favorite" style="width:auto"> Jadikan favorit</label><br><br>

      <button class="btn" onclick="saveData()">Simpan Rekomendasi</button>
      <button class="btn danger" onclick="resetForm()">Reset</button>
    </section>

    <section>
      <h2>Data Rekomendasi</h2>
      <div id="list" class="row"></div>
    </section>
  </main>

<script>
const SUPABASE_URL = "https://foivzaaqybjkteiqhpet.supabase.co";
const SUPABASE_KEY = "sb_publishable_esdVli0x3S6pk_dBz7P8HA_EggkaxTa";
let dataCache = [];

function f(id){ return document.getElementById(id); }

function esc(value){
  return String(value ?? "").replace(/[&<>"']/g, function(ch){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
  });
}

async function request(path, options={}){
  options.headers = {
    apikey: SUPABASE_KEY,
    Authorization: "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json",
    Prefer: "return=representation",
    ...(options.headers || {})
  };
  return fetch(SUPABASE_URL + path, options);
}

async function loadData(){
  const res = await request("/rest/v1/mood_foods?select=*&order=created_at.desc");
  const data = await res.json();
  dataCache = Array.isArray(data) ? data : [];

  const list = f("list");
  if(!Array.isArray(data)){
    list.innerHTML = "<div class='card'><b>Error database:</b><pre>"+esc(JSON.stringify(data,null,2))+"</pre></div>";
    return;
  }

  list.innerHTML = data.map(item => `
    <div class="card">
      <p>
        <span class="badge">${esc(item.mood)}</span>
        ${item.is_favorite ? "&#9733; Favorit" : ""}
      </p>
      <h2>${esc(item.food_name)}</h2>
      <p><b>${esc(item.category)}</b> &bull; ${esc(item.taste || "-")}</p>
      <p>${esc(item.reason)}</p>
      <button class="btn edit" onclick="editDataById(${item.id})">Edit</button>
      <button class="btn danger" onclick="deleteData(${item.id})">Hapus</button>
    </div>
  `).join("");
}

function resetForm(){
  f("row_id").value="";
  f("mood").value="";
  f("food_name").value="";
  f("category").value="";
  f("taste").value="";
  f("reason").value="";
  f("is_favorite").checked=false;
}

function editDataById(rowId){
  const item = dataCache.find(row => row.id === rowId);
  if(!item) return;

  f("row_id").value=item.id;
  f("mood").value=item.mood;
  f("food_name").value=item.food_name;
  f("category").value=item.category;
  f("taste").value=item.taste || "";
  f("reason").value=item.reason;
  f("is_favorite").checked=!!item.is_favorite;
  window.scrollTo({top:0,behavior:"smooth"});
}

async function saveData(){
  const payload = {
    mood: f("mood").value,
    food_name: f("food_name").value,
    category: f("category").value,
    taste: f("taste").value,
    reason: f("reason").value,
    is_favorite: f("is_favorite").checked,
    updated_at: new Date().toISOString()
  };

  if(!payload.mood || !payload.food_name || !payload.category || !payload.reason){
    alert("Mood, nama makanan, kategori, dan alasan wajib diisi.");
    return;
  }

  if(f("row_id").value){
    await request("/rest/v1/mood_foods?id=eq."+f("row_id").value, {method:"PATCH", body:JSON.stringify(payload)});
  } else {
    payload.created_at = new Date().toISOString();
    await request("/rest/v1/mood_foods", {method:"POST", body:JSON.stringify(payload)});
  }

  resetForm();
  loadData();
}

async function deleteData(rowId){
  if(confirm("Hapus data ini?")){
    await request("/rest/v1/mood_foods?id=eq."+rowId, {method:"DELETE"});
    loadData();
  }
}

loadData();
</script>
</body>
</html>
